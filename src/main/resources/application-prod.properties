# Application Configuration
spring.application.name=playschool-management-backend
# Binds to Render's dynamic port environment variable, falling back to 8080 if not found
server.port=${PORT:8080}

# Database Configuration (Production PostgreSQL)
# Note: Using the External URL. If your backend app is deployed on Render in the same region, 
# you can swap this to the internal host: jdbc:postgresql://dpg-d949hb0js32c73dvrmbg-a/studentmng_db
spring.datasource.url=jdbc:postgresql://dpg-d949hb0js32c73dvrmbg-a.oregon-postgres.render.com:5432/studentmng_db
spring.datasource.username=studentmng_db_user
spring.datasource.password=3JXSTosxnGNJmOGSzAu8FSp3CXxr4mT7
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration for Production
# Change this temporarily from 'validate' to 'update'
spring.jpa.hibernate.ddl-auto=update
# Disabled SQL printing in console to prevent massive log files and keep data out of stdout streams
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# PostgreSQL specific settings
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Logging Configuration (Optimized for Production)
# Swapped from 'DEBUG' to 'INFO/WARN' to maximize performance and minimize disk usage
logging.level.root=INFO
logging.level.com.playschool.management=INFO
logging.level.org.springframework.security=WARN

# CORS Configuration
# Remember to update these with your actual production frontend domain URLs!
cors.allowed-origins=http://localhost:3000,http://localhost:3001

# Connection Pool Configuration (Hikari)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000