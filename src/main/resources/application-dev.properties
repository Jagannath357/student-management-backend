spring.application.name=course-management-system

# ===================================================================
# Server Configuration
# ===================================================================
server.port=8090

# ===================================================================
# MySQL Database Configuration
# ===================================================================
# Configuration for the Student Course Management System database[cite: 1]
# Appended &allowPublicKeyRetrieval=true to resolve database connectivity issues
spring.datasource.url=jdbc:mysql://localhost:3306/student_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Replace these with your local MySQL credentials
spring.datasource.username=root
spring.datasource.password=Jaga123@mysql

# ===================================================================
# JPA / Hibernate Configuration
# ===================================================================
# Automatically validates and updates the database schema structure
spring.jpa.hibernate.ddl-auto=update

# Enables logging of SQL statements to the console for easier debugging
spring.jpa.show-sql=true

# Specifies the database dialect to optimize SQL generation for MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect