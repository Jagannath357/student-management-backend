spring.application.name=course-management-system

# ===================================================================
# Server Configuration
# ===================================================================
# Dynamically binds to Render's assigned port, defaulting to 8090 locally
server.port=${PORT:8090}

# ===================================================================
# Database Configuration (Dynamic Fallback Architecture)
# ===================================================================
# If SPRING_DATASOURCE_URL environment variable is found, it uses it (PostgreSQL). 
# Otherwise, it falls back to your local MySQL instance automatically.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/student_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Jaga123@mysql}

# ===================================================================
# JPA / Hibernate Configuration
# ===================================================================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.MySQLDialect}